services:
  db:
    image: postgres:16
    container_name: electoral_evidence_db
    environment:
      POSTGRES_DB: electoral_evidence
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d electoral_evidence"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: electoral_evidence_api
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    container_name: electoral_evidence_dashboard
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8501:8501"
    depends_on:
      - api
    volumes:
      - .:/app
    command: streamlit run app/dashboard/streamlit_app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
